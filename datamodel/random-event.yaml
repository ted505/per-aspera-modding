random_event_available_methane_asteroid:
  eventsPerYear: 0.05 ### Once per 20 years
  criteria: 
    - '$methane_asteroid_completed == true'
  actions:
    - { command: SetBlackboardBool, arguments: [PlayerFaction, methane_asteroid_completed, false] }
    - { command: OpenPopup, arguments: [popup_methane_asteroid_available] }
