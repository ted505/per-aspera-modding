building: !building landing_site
longitude: 60.1
latitude: 7.5
clearAreaRadius: 300
initializeAdditionalResourceVeins: false
#This veins are for additional landing sites(in campaign) or for all landing sites(in sandbox)
#Initial landing site veins on campaign are handled in ScatterSetup because the building position is fixed(this could be unified maybe?)
#And some other campaign veins are handled in rules as the story progresses
baseStarterVeins:
