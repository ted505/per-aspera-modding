# ======= COMMANDER =================================================

idle:
  root:
    !Node_Sequence
    children:
      - !Node_If
        criterions: ['$can_retaliate == true']
        match:
          !Node_Sequence
          children:
            - !Node_Print { text: Retaliate }
            - !Node_SetBool   { variable: can_retaliate, value: false }
            - !Node_VFSMSetState { state: !BT attack }

end_wave:	
  root:
    !Node_If
    criterions: ['$attacking == true']
    match:
      !Node_Sequence
      children:
        - !Node_Print { text: Ending wave }
        - !Node_DispatchFactionEvent { eventType: GevFactionAIWaveEnded }
        - !Node_SetBool   { variable: attacking, value: false }
        - !Node_Increment { variable: military_wave }
        - !Node_Increment { variable: building_stage }
        - !Node_CopyVar   { destination: military_cooldown, source: wave_cooldown_set }
        - !Node_SetNumber { variable: player_buildings_destroyed, value: 0 }
        - !Node_SetNumber { variable: wave_inflicted_building_damage, value: 0 }
        - !Node_SetNumber { variable: wave_received_building_damage, value: 0 }


retreat:    # full retreat
  root:
    !Node_Sequence
    children:
      - !Node_Retreat {}
      # TODO wait some time...?
      - !Node_Subroutine { state: !BT end_wave }
      - !Node_VFSMSetState { state: !BT idle }

defend:
  root:
    !Node_Sequence
    children:
      - !Node_Defend {} # DEPRECATED!!!
      - !Node_If
        criterions: ['$military_incoming_attack_power <= 0.01']
        match:
          !Node_Sequence
          children:
            - !Node_Print
              text: Done defending
            - !Node_Subroutine { state: !BT end_wave }
            - !Node_VFSMSetState { state: !BT idle }

start_attack:
  root:
    !Node_Sequence
    children:          
      - !Node_DispatchFactionEvent
        eventType: GevFactionAIWaveStarted 
      - !Node_CopyVar
        destination: wave_remaining_damage
        source: wave_target_damage
      - !Node_Attack # DEPRECATED!!!
        prioritizeBuildings:
          !building building_space_elevator                     : 10
          !building building_terraforming_biodome               : 10
          !building building_terraforming_ghg_factory           : 10
          !building building_nuclear_nitrate_extractor          : 10
          !building building_nuclear_carbonate_extractor        : 10
          !building building_terraforming_oxygen_release_plant  : 10
          !building defense_drone_hive                          : 5
          !building building_military_drone_factory             : 2
          !building landing_site                                : -1
      - !Node_SetBool
        variable: attacking
        value: true

attack:
  root:
    !Node_Sequence
    children:
      - !Node_IfElse
        criterions: [ '$attacking==false' ]
        match:
          !Node_Subroutine { state: !BT start_attack }
        else:
          !Node_If
          criterions: [ '$building_stage < 3' ]
          match:
            !Node_ReturnUnhealthySwarms { healthFactorThreshold: 0.1 }
