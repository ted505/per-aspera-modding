  criteria: 
    - '$trigger_first_meteorite_shower == false'
  actions:
    - { command: CreateAsteroidHazard, arguments: [hazard_asteroid_large_safe] }
random_event_sandstorm_winter_safe_zone:
  eventsPerYear: 1
  criteria: 
    - '$is_southern_summer #= 0'	
    - '$trigger_first_sandstorm == false'
  actions:
    - { command: CreateSandstormHazard, arguments: [hazard_sandstorm_medium_safe] }
random_event_sandstorm_winter_2_safe_zone:
  eventsPerYear: 1
  criteria: 
    - '$is_southern_summer #= 0'	
    - '$trigger_first_sandstorm == false'
  actions:
