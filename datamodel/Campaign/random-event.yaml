random_event_sandstorm_summer_safe_zone:
  eventsPerYear: 2
  criteria: 
    - '$is_southern_summer #= 1'
    - '$trigger_first_sandstorm == false'
  actions:
    - { command: CreateSandstormHazard, arguments: [hazard_sandstorm_large_safe] }
random_event_sandstorm_summer_2_safe_zone:
  eventsPerYear: 3
  criteria: 
    - '$is_southern_summer #= 1'
    - '$trigger_first_sandstorm == false'
  actions:
    - { command: CreateSandstormHazard, arguments: [hazard_sandstorm_medium_safe] }
### First Sandstorm
random_event_first_sandstorm:
  eventsPerYear: 1
  criteria: 
    - '$quest_completed.quest_maintenance #= 1'
    - '$trigger_first_sandstorm == false'
    - '$days >= 668'
  actions:
    - { command: SetBlackboardBool, arguments: [PlayerFaction, trigger_first_sandstorm, true] }
### First Meteorite Shower
random_event_meteorite_shower_asteroids_small:
  eventsPerYear: 1200
  criteria: 
    - '$trigger_first_meteorite_shower == true'
    - '$finish_first_meteorite_shower == false'
  actions:
    - { command: CreateAsteroidHazard, arguments: [hazard_asteroid_small] }
random_event_meteorite_shower_asteroids_medium:
  eventsPerYear: 120
  criteria: 
    - '$trigger_first_meteorite_shower == true'
