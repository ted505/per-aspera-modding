### Safe Area hazards (will not affect player)
random_event_dust_devils_safe_zone:
  eventsPerYear: 10
  criteria: 
    - '$trigger_first_sandstorm == false'
  actions:
    - { command: CreateDevilHazard, arguments: [hazard_devil_medium_safe] }
random_event_asteroids_small_safe_zone:
  eventsPerYear: 50
  criteria: 
    - '$trigger_first_meteorite_shower == false'
  actions:
    - { command: CreateAsteroidHazard, arguments: [hazard_asteroid_small_safe] }
random_event_asteroids_medium_safe_zone:
  eventsPerYear: 5
  criteria: 
    - '$trigger_first_meteorite_shower == false'
  actions:
    - { command: CreateAsteroidHazard, arguments: [hazard_asteroid_medium_safe] }
random_event_asteroids_large_safe_zone:
