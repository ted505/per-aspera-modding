### Formulas: Equation (5) from "Technological Requirements for Terraforming Mars", Zubrin, McKay. co2IceCapPressureTarget = co2IceCapPressureSystemFactor * Mathf.Exp(co2IceCapPressureSystemInverseTemperatureMultiplier / Tpole)
co2IceCapPressureSystemFactor:          12300000000         # 1.23E7 * 1000
co2IceCapPressureSystemInverseTemperatureMultiplier: -3080  # 3080 works better than 3168

### Formulas: Regolith System Pressure = Mathf.Min( co2Pressure + co2RegolithDeposits, Mathf.Pow(regolithSystemDepositsMultiplier * co2RegolithDeposits * Mathf.Exp( averageTemperature * regolithSystemTemperatureMultiplier), regolithSystemDepositsExponent) )
regolithSystemDepositsMultiplier:       0.0000008455 # 8.455E-7
regolithSystemTemperatureMultiplier:    0.04    # 1/25
regolithSystemDepositsExponent:         3.6363  # 1/0.275

### Formulas: Pole Temperature = averageTemperature - poleTemperatureMainFactor / (poleTemperatureCO2PressureAdditionalTerm + poleTemperatureCO2PressureMultiplier * co2Pressure );
poleTemperatureMainFactor:              75
poleTemperatureCO2PressureMultiplier:   0.005   # 5 / 1000
poleTemperatureCO2PressureAdditionalTerm: 1

### Formulas: Dynamic water level
iceToWaterConversionRatio:              0.001   # 1 / 1000
dailyIceMeltTemperature:                373.15  # Kelvins (100 Celcius). On average, the amount of ice melted per day from each vein is (current vein temperature - waterFreezingTemperature) / (dailyIceMeltTemperature - waterFreezingTemperature)

