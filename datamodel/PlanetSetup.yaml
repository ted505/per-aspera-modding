maxTemperatureSinPhiFactor:             -12.5      # maxTemperatureSinPhiSquaredFactor + maxTemperatureSinPhiFactor subtracted from thermal equilibrium in southern summer, maxTemperatureSinPhiSquaredFactor - maxTemperatureSinPhiFactor added to thermal equilibrium in southern winter.
maxTemperatureSinPhiSquaredFactor:      -2.5
minTemperatureFactor:                   -65        # Added to temperature 90 degrees from thermal equator
temperatureAltitudeFactor:              2          # Temperature - according to data it's 1.5 on current Mars, 2.5 if Mars had 1bar atmosphere
temperatureVarianceExponent:            4.6        # Temperature variance = 2 / (1 + (current temperature / baseTemperature) ^ temperatureVarianceExponent). Multiplies to maxTemperatureFactor, maxTemperatureSinPhiFactor, maxTemperatureSinPhiSquaredFactor, minTemperatureFactor

