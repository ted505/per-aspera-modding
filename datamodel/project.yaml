project_import_ghg_from_earth:
  description: BE_project_import_ghg_from_earth_description
  criterions: []
  expirationCriterions:
    - '$killswitch_carmine == true' ## No Collaboration from Earth in this ending
  iconName: KnowledgeBase/ICO_KB_ImportGhgFromEarth
  defaultVisible: true
  index: 19
  launchType: Continuous
  name: BE_project_import_ghg_from_earth_name
  portProjectType:
    requiredDevelopmentResources:
      !resource resource_aluminum: 10
      !resource resource_parts: 10
      !resource resource_electronics: 10
      !resource resource_chemicals: 10
  launchActions:
    - command: ImportResource
      arguments:    
        - PlayerFaction
        - GHG
        - 0.01
  specialProjectController:
    !SpecialProjectControllerBase
    spaceportCardPrefab: "SpaceportProjects/SpecialProjectReturnRelease"
    spaceportCardPrefabPerBuilding:
      building_space_elevator: "SpaceElevatorProjects/SpecialProjectReturnRelease_Elevator"
    specialProjectCardPrefab: card2
    spaceportStages:
      - key: BE_project_spaceportStages_resources_gather
        buildingAnimatorTriggerEnter: "Gathering"
        iconName: GatherResources
        specialCriteria: ResourcesMet
        cancellable: true
        monthsDuration: 0
        onEnter: []
      - key: BE_project_spaceportStages_ship_build
        buildingAnimatorTriggerEnter: "Building"
        buildAnimation: true
        iconName: Construction
        cancellable: true
        monthsDuration: 3
        onEnter: []
      - key: BE_project_spaceportStages_ship_launch
        buildingAnimatorTriggerEnter: "TransitLaunch"
        animatorTriggerEnter: "ShipOut"
        iconName: Launch
        cancellable: true
        monthsDuration: 5
        onEnter: []
      - key: BE_project_spaceportStages_material_harvest
        iconName: Harvests
        cancellable: true
        monthsDuration: 0.5
        onEnter: []
      - key: BE_project_spaceportStages_ship_return
        animatorTriggerExit: "ShipIn"
        iconName: LandingPort
        cancellable: true
        monthsDuration: 5
        onEnter: []
      - key: BE_project_spaceportStages_material_release
        animatorTriggerExit: "GasReleaseEnd"
        buildingAnimatorTriggerExit: "Transit"
        focusPosition: Port
        focusCameraZoom: 300
        focusCameraTiltY: -45
        focusCameraTiltX: 30
        focusCondition: FirstTime
        iconName: Releases
        cancellable: true
        monthsDuration: 0.5
        onEnter: []

