  criterions: []
  expirationCriterions:
    - '$killswitch_carmine == true' ## No Collaboration from Earth in this ending
  iconName: KnowledgeBase/ICO_KB_MassColonist
  defaultVisible: true
  index: 28
  launchType: Continuous
  name: BE_project_massive_migration_name
  requiredBuilding: !building building_space_elevator  
  animatorTriggerCompleted: "FinalLaunch"
  portProjectType:
    requiredDevelopmentResources: {}
  launchActions: []
  specialProjectController:
    !SpecialProjectControllerBase
    spaceportCardPrefab: "ColonistMigration/MassColonistMigration"
    spaceportCardPrefabPerBuilding:
      building_space_elevator: "ColonistMigration/MassColonistMigration_Elevator"
    specialProjectCardPrefab: card2
    spaceportStages:
      - key: BE_project_spaceportStages_on_earth
        iconName: OnEarth
        cancellable: true
        monthsDuration: 5
        onEnter: []
      - key: BE_project_spaceportStages_in_transit_Mars
        iconName: TransitToMars
        cancellable: false
        monthsDuration: 7
        onEnter: []
      - key: BE_project_spaceportStages_on_Mars
        iconName: OnMars
        animatorTriggerEnter: "ShipIn"
        animatorTriggerExit: "ShipOut"
        buildingAnimatorTriggerEnter: "Transit"
        buildingAnimatorTriggerExit: "Transit"
        cancellable: false
        focusPosition: Port
        focusCameraZoom: 150
        focusCameraTiltY: -30
        focusCondition: FirstTime
        monthsDuration: 5
        onEnter: 
          - command: IncomingShip
            arguments:    
              - PlayerFaction
              - 2000
      - key: BE_project_spaceportStages_in_transit_Earth
        iconName: TransitToEarth
        cancellable: false
        monthsDuration: 7
        onEnter:
          - command: DepartingShip
            arguments:    
              - PlayerFaction


