    - !quest quest_terraforming_stage_2
  tasks:
    - !QuestTaskCriterion
      criterion: '$temperature >= 273'
      name: BE_quest_terraforming_stage_3_task1
    - !QuestTaskCriterion
      criterion: '$pressure_o2 >= 1'
      name: BE_quest_terraforming_stage_3_task2
