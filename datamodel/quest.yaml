quest_terraforming_stage_1:
  description: BE_quest_terraforming_stage_1_description
  name: BE_quest_terraforming_stage_1_name
  subTitle: BE_Current_Stage_1
  requirements: []
  tasks:
    - !QuestTaskCriterion
      criterion: '$temperature >= 223'
      name: BE_quest_terraforming_stage_1_task1
    - !QuestTaskCriterion
      criterion: '$frozen_co2 <= 5'
      name: BE_quest_terraforming_stage_1_task2
  unlockAutomatically: true
  color: 929292
  iconName: Quest Icons/ICO_Stage_1
#### TERRAFORMING 2
quest_terraforming_stage_2:
  description: BE_quest_terraforming_stage_2_description
  name: BE_quest_terraforming_stage_2_name
  subTitle: BE_Current_Stage_2
  requirements:
    - !quest quest_terraforming_stage_1
  tasks:
    - !QuestTaskCriterion
      criterion: '$pressure >= 300'
      name: BE_quest_terraforming_stage_2_task1
  unlockAutomatically: true
  color: 3A3A3A
  iconName: Quest Icons/ICO_Stage_2
### TERRAFORMING 3
quest_terraforming_stage_3:
  description: BE_quest_terraforming_stage_3_description
